<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadowverse WB 戦績記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f8f7ff;
  --bg3: #f0eeff;
  --border: rgba(100,80,200,0.12);
  --border2: rgba(100,80,200,0.2);
  --text: #1a1530;
  --text2: #6b5fa0;
  --text3: #9990c4;
  --purple: #7c6fe0;
  --purple-light: #9d93e8;
  --purple-dim: rgba(124,111,224,0.15);
  --green: #0a8a50;
  --green-dim: rgba(74,222,152,0.12);
  --red: #cc2222;
  --red-dim: rgba(240,96,96,0.12);
  --blue: #1a6fd4;
  --blue-dim: rgba(96,165,250,0.12);
  --amber: #b07010;
  --amber-dim: rgba(251,191,36,0.12);
  --pink: #c0186a;
  --pink-dim: rgba(219,54,130,0.13);
  --pink-border: rgba(219,54,130,0.4);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.6;
}

/* HEADER */
.site-header {
  background: linear-gradient(135deg, #ede9ff 0%, #ffffff 60%);
  border-bottom: 0.5px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.logo {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, #7c6fe0, #5b4fc7);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
  box-shadow: 0 0 16px rgba(124,111,224,0.25);
}
.site-title { font-size: 17px; font-weight: 700; color: var(--text); }
.site-subtitle { font-size: 11px; color: var(--text2); margin-left: 4px; }

/* LAYOUT */
.container { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; }

/* TABS */
.tabs {
  display: flex; gap: 4px;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 1.5rem;
}
.tab {
  flex: 1; padding: 9px 8px;
  text-align: center; font-size: 13px; font-weight: 500;
  border: none; background: none; color: var(--text2);
  border-radius: var(--radius-sm); cursor: pointer;
  transition: all 0.2s;
}
.tab.active {
  background: var(--purple-dim);
  color: var(--purple-light);
  border: 0.5px solid rgba(124,111,224,0.3);
}

/* METRIC CARDS */
.metrics {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.metric {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: .9rem .75rem; text-align: center;
}
.metric-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 700; }
.c-green { color: var(--green); }
.c-red { color: var(--red); }
.c-blue { color: var(--blue); }
.c-amber { color: var(--amber); }
.c-purple { color: var(--purple-light); }

/* CARD */
.card {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.25rem;
}
.card-title {
  font-size: 11px; font-weight: 700;
  color: var(--text3); letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 1rem;
}

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
.form-grid.single { grid-template-columns: 1fr; }
.form-group label {
  display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px;
}
.form-group select,
.form-group input,
.form-group textarea {
  width: 100%;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  padding: 8px 10px; font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  transition: border-color 0.2s;
}
.form-group select:focus,
.form-group input:focus,
.form-group textarea:focus {
  outline: none; border-color: var(--purple);
}
.form-group textarea { resize: vertical; min-height: 56px; }
.form-group select option { background: var(--bg3); }

/* TOGGLE BUTTONS */
.toggle-group { display: flex; gap: 8px; margin-bottom: 10px; }
.section-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.toggle-btn {
  flex: 1; padding: 10px 8px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--bg3); color: var(--text2);
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all 0.18s;
  font-family: 'Noto Sans JP', sans-serif;
}
.toggle-btn:hover { border-color: var(--border2); color: var(--text); }
.toggle-btn.t-win { background: var(--green-dim); border-color: rgba(74,222,152,0.4); color: var(--green); }
.toggle-btn.t-lose { background: var(--red-dim); border-color: rgba(240,96,96,0.4); color: var(--red); }
.toggle-btn.t-first { background: var(--pink-dim); border-color: var(--pink-border); color: var(--pink); }
.toggle-btn.t-second { background: var(--amber-dim); border-color: rgba(251,191,36,0.4); color: var(--amber); }

/* SUBMIT BUTTON */
.btn-submit {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #7c6fe0, #5b4fc7);
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity 0.2s;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .03em;
  margin-top: 12px;
  box-shadow: 0 4px 16px rgba(124,111,224,0.2);
}
.btn-submit:hover { opacity: 0.88; }

/* FILTER */
.filter-wrap {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem;
}
.date-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.date-tab {
  padding: 4px 14px; font-size: 12px;
  border: 0.5px solid var(--border2);
  border-radius: 20px; cursor: pointer;
  background: var(--bg3); color: var(--text2);
  font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.18s;
}
.date-tab.active { background: var(--purple-dim); color: var(--purple-light); border-color: rgba(124,111,224,0.4); }
.date-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.date-nav button {
  padding: 5px 12px; font-size: 13px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); cursor: pointer;
  background: var(--bg3); color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
}
.date-nav button:hover { border-color: var(--purple); }
.date-label { flex: 1; text-align: center; font-size: 13px; font-weight: 500; }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.filter-row:last-child { margin-bottom: 0; }
.filter-select, .filter-input {
  flex: 1; min-width: 110px;
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  padding: 6px 10px; font-size: 12px;
  font-family: 'Noto Sans JP', sans-serif;
}
.filter-select option { background: var(--bg3); }

/* HISTORY SUMMARY */
.history-summary {
  font-size: 12px; color: var(--text2);
  margin-bottom: 10px; display: flex; gap: 10px; align-items: center;
}

/* BATTLE ITEMS */
.battles-list { display: flex; flex-direction: column; gap: 8px; }
.battle-item {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: .9rem 1rem;
  display: flex; align-items: flex-start; gap: 10px;
  transition: border-color 0.18s;
}
.battle-item:hover { border-color: var(--border2); }
.result-badge {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.badge-win { background: var(--green-dim); color: var(--green); }
.badge-lose { background: var(--red-dim); color: var(--red); }
.battle-info { flex: 1; min-width: 0; }
.battle-main { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.battle-sub { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
.battle-opp-deck { font-size: 11px; color: var(--text2); margin-top: 2px; }
.battle-memo { font-size: 11px; color: var(--text3); margin-top: 3px; font-style: italic; }
.pill {
  display: inline-block; padding: 1px 7px; border-radius: 10px;
  font-size: 11px; font-weight: 500; margin-left: 4px;
}
.pill-first { background: var(--pink-dim); color: var(--pink); }
.pill-second { background: var(--amber-dim); color: var(--amber); }
.pill-fmt { background: var(--bg3); color: var(--text3); }
.battle-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.battle-time { font-size: 11px; color: var(--text3); white-space: nowrap; }
.delete-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); padding: 2px; line-height: 1; font-size: 14px;
  transition: color 0.18s;
}
.delete-btn:hover { color: var(--red); }

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.25rem; }
.stats-card {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 1rem;
}
.stats-card-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: 12px;
}
.class-row { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; font-size: 12px; }
.class-name { width: 68px; flex-shrink: 0; color: var(--text2); }
.bar-wrap { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; background: var(--purple); transition: width 0.4s ease; }
.bar-fill.opp { background: var(--red); }
.rate-lbl { width: 54px; text-align: right; font-size: 11px; color: var(--text2); white-space: nowrap; }
.fs-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
.fs-block {
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 1rem; text-align: center;
}
.fs-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.fs-val { font-size: 24px; font-weight: 700; }
.fs-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* EMPTY */
.empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text3); font-size: 13px; }
.empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #f0eeff; }
::-webkit-scrollbar-thumb { background: rgba(100,80,200,0.2); border-radius: 2px; }

@media (max-width: 480px) {
  .form-grid { grid-template-columns: 1fr 1fr; }
  .form-grid.three { grid-template-columns: 1fr 1fr; }
  .stats-grid { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">SV</div>
  <div>
    <div class="site-title">Shadowverse 戦績記録</div>
    <div class="site-subtitle">Worlds Beyond</div>
  </div>
</header>

<div class="container">

  <div class="tabs">
    <button class="tab active" onclick="showTab('record')">📝 記録</button>
    <button class="tab" onclick="showTab('history')">📋 履歴</button>
    <button class="tab" onclick="showTab('stats')">📊 統計</button>
  </div>

  <!-- RECORD TAB -->
  <div id="tab-record">
    <div class="metrics">
      <div class="metric" style="grid-column:1/-1;background:linear-gradient(135deg,#f3f1ff,#fff);border-color:rgba(124,111,224,0.2)">
        <div class="metric-label" style="font-size:12px;font-weight:700;letter-spacing:.05em">📅 本日の戦績</div>
      </div>
      <div class="metric"><div class="metric-label">対戦数</div><div class="metric-value c-purple" id="m-total">0</div></div>
      <div class="metric"><div class="metric-label">勝利</div><div class="metric-value c-green" id="m-win">0</div></div>
      <div class="metric"><div class="metric-label">敗北</div><div class="metric-value c-red" id="m-lose">0</div></div>
      <div class="metric"><div class="metric-label">勝率</div><div class="metric-value" id="m-rate">-%</div></div>
      <div class="metric"><div class="metric-label">先攻勝率</div><div class="metric-value" style="color:var(--pink)" id="m-first">-%</div></div>
      <div class="metric"><div class="metric-label">後攻勝率</div><div class="metric-value c-amber" id="m-second">-%</div></div>
    </div>

    <div class="card">
      <div class="card-title">新規対戦を追加</div>

      <div class="form-grid">
        <div class="form-group">
          <label>使用クラス</label>
          <select id="my-class">
            <option value="">選択してください</option>
            <option>エルフ</option><option>ロイヤル</option><option>ウィッチ</option>
            <option>ドラゴン</option><option>ナイトメア</option><option>ビショップ</option><option>ネメシス</option>
          </select>
        </div>
        <div class="form-group">
          <label>デッキ名（任意）</label>
          <input type="text" id="my-deck" placeholder="例: アグロロイヤル">
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>相手クラス</label>
          <select id="opp-class">
            <option value="">選択してください</option>
            <option>エルフ</option><option>ロイヤル</option><option>ウィッチ</option>
            <option>ドラゴン</option><option>ナイトメア</option><option>ビショップ</option><option>ネメシス</option>
          </select>
        </div>
        <div class="form-group">
          <label>相手デッキタイプ（任意）</label>
          <input type="text" id="opp-deck" placeholder="例: 秘術ウィッチ">
        </div>
      </div>

      <div class="form-grid three">
        <div class="form-group">
          <label>形式</label>
          <select id="format">
            <option>BO1</option><option>BO3</option>
          </select>
        </div>
        <div class="form-group">
          <label>モード</label>
          <select id="mode">
            <option>ランクマッチ</option><option>カジュアル</option><option>2Pick</option>
          </select>
        </div>
        <div class="form-group">
          <label>日時</label>
          <input type="datetime-local" id="battle-time" style="font-size:12px">
        </div>
      </div>

      <div class="section-label">先攻 / 後攻</div>
      <div class="toggle-group" style="margin-bottom:14px">
        <button class="toggle-btn" id="btn-first" onclick="selectOrder('first')">⚔️ 先攻</button>
        <button class="toggle-btn" id="btn-second" onclick="selectOrder('second')">🛡️ 後攻</button>
      </div>

      <div class="section-label">勝敗</div>
      <div class="toggle-group">
        <button class="toggle-btn" id="btn-win" onclick="selectResult('win')">🏆 勝利</button>
        <button class="toggle-btn" id="btn-lose" onclick="selectResult('lose')">✕ 敗北</button>
      </div>

      <div class="form-grid single" style="margin-top:12px">
        <div class="form-group">
          <label>メモ（任意）</label>
          <textarea id="memo" placeholder="試合の感想・ポイントを記録..."></textarea>
        </div>
      </div>

      <button class="btn-submit" onclick="addBattle()">＋ 記録する</button>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" style="display:none">
    <div class="filter-wrap">
      <div class="card-title" style="margin-bottom:8px">期間</div>
      <div class="date-tabs">
        <button class="date-tab active" id="dt-all" onclick="setDateMode('all')">全期間</button>
        <button class="date-tab" id="dt-day" onclick="setDateMode('day')">日単位</button>
        <button class="date-tab" id="dt-month" onclick="setDateMode('month')">月単位</button>
        <button class="date-tab" id="dt-range" onclick="setDateMode('range')">日付指定</button>
      </div>
      <div id="date-nav-wrap" style="display:none">
        <div class="date-nav">
          <button onclick="shiftDate(-1)">◀</button>
          <div class="date-label" id="date-nav-label"></div>
          <button onclick="shiftDate(1)">▶</button>
        </div>
      </div>
      <div id="date-range-wrap" style="display:none;margin-bottom:10px">
        <div class="form-grid" style="margin-bottom:0">
          <div class="form-group">
            <label>開始日</label>
            <input type="date" id="range-from" onchange="renderHistory()">
          </div>
          <div class="form-group">
            <label>終了日</label>
            <input type="date" id="range-to" onchange="renderHistory()">
          </div>
        </div>
      </div>
      <div class="card-title" style="margin-top:12px;margin-bottom:8px">絞り込み</div>
      <div class="filter-row">
        <select class="filter-select" id="filter-class" onchange="renderHistory()">
          <option value="">全クラス（自分）</option>
          <option>エルフ</option><option>ロイヤル</option><option>ウィッチ</option>
          <option>ドラゴン</option><option>ナイトメア</option><option>ビショップ</option><option>ネメシス</option>
        </select>
        <input class="filter-input" id="filter-my-deck" placeholder="自分のデッキ名" oninput="renderHistory()">
      </div>
      <div class="filter-row">
        <select class="filter-select" id="filter-opp-class" onchange="renderHistory()">
          <option value="">全クラス（相手）</option>
          <option>エルフ</option><option>ロイヤル</option><option>ウィッチ</option>
          <option>ドラゴン</option><option>ナイトメア</option><option>ビショップ</option><option>ネメシス</option>
        </select>
        <input class="filter-input" id="filter-opp-deck" placeholder="相手デッキ名" oninput="renderHistory()">
      </div>
      <div class="filter-row">
        <select class="filter-select" id="filter-result" onchange="renderHistory()">
          <option value="">全結果</option>
          <option value="win">勝利</option>
          <option value="lose">敗北</option>
        </select>
        <select class="filter-select" id="filter-order" onchange="renderHistory()">
          <option value="">先攻/後攻</option>
          <option value="first">先攻</option>
          <option value="second">後攻</option>
        </select>
        <input class="filter-input" id="filter-opp-deck" placeholder="相手デッキ名" oninput="renderHistory()">
      </div>
    </div>
    <div class="history-summary" id="history-summary"></div>
    <div class="battles-list" id="battles-list">
      <div class="empty-state"><div class="empty-icon">⚔️</div>対戦記録がありません</div>
    </div>
  </div>

  <!-- STATS TAB -->
  <div id="tab-stats" style="display:none">
    <div class="metrics">
      <div class="metric"><div class="metric-label">総対戦</div><div class="metric-value c-purple" id="s-total">0</div></div>
      <div class="metric"><div class="metric-label">勝利</div><div class="metric-value c-green" id="s-win">0</div></div>
      <div class="metric"><div class="metric-label">敗北</div><div class="metric-value c-red" id="s-lose">0</div></div>
      <div class="metric"><div class="metric-label">勝率</div><div class="metric-value" id="s-rate">-%</div></div>
    </div>
    <div class="fs-row">
      <div class="fs-block">
        <div class="fs-label">先攻勝率</div>
        <div class="fs-val" style="color:var(--pink)" id="s-first-rate">-%</div>
        <div class="fs-sub" id="s-first-rec">0戦</div>
      </div>
      <div class="fs-block">
        <div class="fs-label">後攻勝率</div>
        <div class="fs-val c-amber" id="s-second-rate">-%</div>
        <div class="fs-sub" id="s-second-rec">0戦</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-card-title">使用クラス別勝率</div>
        <div id="my-class-stats"><div class="empty-state" style="padding:.5rem;font-size:12px">データなし</div></div>
      </div>
      <div class="stats-card">
        <div class="stats-card-title">対戦クラス別勝率</div>
        <div id="opp-class-stats"><div class="empty-state" style="padding:.5rem;font-size:12px">データなし</div></div>
      </div>
    </div>
  </div>

</div>

<script>
const CLASSES=['エルフ','ロイヤル','ウィッチ','ドラゴン','ナイトメア','ビショップ','ネメシス'];
const STORAGE_KEY='svwb-battles-v1';
let battles=[];
let selResult=null, selOrder=null;
let dateMode='all';
let cursorDate=new Date();

function nowLocal(){
  const n=new Date(), p=v=>String(v).padStart(2,'0');
  return `${n.getFullYear()}-${p(n.getMonth()+1)}-${p(n.getDate())}T${p(n.getHours())}:${p(n.getMinutes())}`;
}

function loadData(){
  try{const d=localStorage.getItem(STORAGE_KEY);if(d)battles=JSON.parse(d);}catch(e){battles=[];}
  document.getElementById('battle-time').value=nowLocal();
  updateAll();
}
function saveData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(battles));}catch(e){}}

function selectResult(r){
  selResult=r;
  document.getElementById('btn-win').className='toggle-btn'+(r==='win'?' t-win':'');
  document.getElementById('btn-lose').className='toggle-btn'+(r==='lose'?' t-lose':'');
}
function selectOrder(o){
  selOrder=o;
  document.getElementById('btn-first').className='toggle-btn'+(o==='first'?' t-first':'');
  document.getElementById('btn-second').className='toggle-btn'+(o==='second'?' t-second':'');
}

function addBattle(){
  const mc=document.getElementById('my-class').value;
  const oc=document.getElementById('opp-class').value;
  if(!mc){alert('使用クラスを選択してください');return;}
  if(!oc){alert('相手クラスを選択してください');return;}
  if(!selOrder){alert('先攻・後攻を選択してください');return;}
  if(!selResult){alert('勝利・敗北を選択してください');return;}
  const bt=document.getElementById('battle-time').value;
  battles.unshift({
    id:Date.now(),
    myClass:mc,
    myDeck:document.getElementById('my-deck').value.trim(),
    oppClass:oc,
    oppDeck:document.getElementById('opp-deck').value.trim(),
    format:document.getElementById('format').value,
    mode:document.getElementById('mode').value,
    order:selOrder, result:selResult,
    memo:document.getElementById('memo').value.trim(),
    time:bt?new Date(bt).toISOString():new Date().toISOString()
  });
  saveData(); updateAll();
  // my-class と my-deck はリセットしない
  ['opp-class','opp-deck','memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('battle-time').value=nowLocal();
  selectResult(null);selResult=null;
  selectOrder(null);selOrder=null;
}

function deleteBattle(id){
  if(!confirm('この記録を削除しますか？'))return;
  battles=battles.filter(b=>b.id!==id);
  saveData(); updateAll();
}

function updateAll(){ updateSummary(); renderHistory(); renderStats(); }

function calcWR(arr){ return arr.length?Math.round(arr.filter(b=>b.result==='win').length/arr.length*100):null; }

function isSameDay(d1,d2){return d1.getFullYear()===d2.getFullYear()&&d1.getMonth()===d2.getMonth()&&d1.getDate()===d2.getDate();}

function updateSummary(){
  // 記録タブ：本日の戦績
  const today=new Date();
  const todayBattles=battles.filter(b=>isSameDay(new Date(b.time),today));
  const tTotal=todayBattles.length, tWins=todayBattles.filter(b=>b.result==='win').length;
  const tRate=tTotal?Math.round(tWins/tTotal*100):null;
  const tfa=todayBattles.filter(b=>b.order==='first'), tsa=todayBattles.filter(b=>b.order==='second');
  const tfr=calcWR(tfa), tsr=calcWR(tsa);
  document.getElementById('m-total').textContent=tTotal;
  document.getElementById('m-win').textContent=tWins;
  document.getElementById('m-lose').textContent=tTotal-tWins;
  document.getElementById('m-rate').textContent=tRate!==null?tRate+'%':'-%';
  document.getElementById('m-first').textContent=tfr!==null?tfr+'%':'-%';
  document.getElementById('m-second').textContent=tsr!==null?tsr+'%':'-%';

  // 統計タブ：全戦績
  const total=battles.length, wins=battles.filter(b=>b.result==='win').length;
  const rate=total?Math.round(wins/total*100):null;
  const fa=battles.filter(b=>b.order==='first'), sa=battles.filter(b=>b.order==='second');
  const fr=calcWR(fa), sr=calcWR(sa);
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-win').textContent=wins;
  document.getElementById('s-lose').textContent=total-wins;
  document.getElementById('s-rate').textContent=rate!==null?rate+'%':'-%';
  const sfr=document.getElementById('s-first-rate'),ssr=document.getElementById('s-second-rate');
  if(sfr)sfr.textContent=fr!==null?fr+'%':'-%';
  if(ssr)ssr.textContent=sr!==null?sr+'%':'-%';
  const sf=document.getElementById('s-first-rec'),ss=document.getElementById('s-second-rec');
  if(sf)sf.textContent=fa.length+'戦 '+fa.filter(b=>b.result==='win').length+'勝';
  if(ss)ss.textContent=sa.length+'戦 '+sa.filter(b=>b.result==='win').length+'勝';
}

function setDateMode(m){
  dateMode=m; cursorDate=new Date();
  ['all','day','month','range'].forEach(x=>{
    const el=document.getElementById('dt-'+x); if(el)el.classList.toggle('active',x===m);
  });
  document.getElementById('date-nav-wrap').style.display=(m==='day'||m==='month')?'block':'none';
  document.getElementById('date-range-wrap').style.display=m==='range'?'block':'none';
  updateDateLabel(); renderHistory();
}
function updateDateLabel(){
  const el=document.getElementById('date-nav-label');
  if(!el)return;
  if(dateMode==='day') el.textContent=cursorDate.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  else if(dateMode==='month') el.textContent=cursorDate.toLocaleDateString('ja-JP',{year:'numeric',month:'long'});
}
function shiftDate(dir){
  if(dateMode==='day') cursorDate.setDate(cursorDate.getDate()+dir);
  else if(dateMode==='month') cursorDate.setMonth(cursorDate.getMonth()+dir);
  updateDateLabel(); renderHistory();
}
function filterByDate(list){
  if(dateMode==='all') return list;
  if(dateMode==='range'){
    const fromVal=document.getElementById('range-from').value;
    const toVal=document.getElementById('range-to').value;
    return list.filter(b=>{
      const ds=b.time.slice(0,10);
      if(fromVal&&ds<fromVal)return false;
      if(toVal&&ds>toVal)return false;
      return true;
    });
  }
  return list.filter(b=>{
    const d=new Date(b.time);
    if(dateMode==='day')return d.getFullYear()===cursorDate.getFullYear()&&d.getMonth()===cursorDate.getMonth()&&d.getDate()===cursorDate.getDate();
    return d.getFullYear()===cursorDate.getFullYear()&&d.getMonth()===cursorDate.getMonth();
  });
}

function renderHistory(){
  updateDateLabel();
  let list=filterByDate(battles);
  const fc=document.getElementById('filter-class').value;
  const foc=document.getElementById('filter-opp-class').value;
  const fr=document.getElementById('filter-result').value;
  const fo=document.getElementById('filter-order').value;
  const fmd=document.getElementById('filter-my-deck').value.trim().toLowerCase();
  const fod=document.getElementById('filter-opp-deck').value.trim().toLowerCase();
  if(fc)list=list.filter(b=>b.myClass===fc);
  if(foc)list=list.filter(b=>b.oppClass===foc);
  if(fr)list=list.filter(b=>b.result===fr);
  if(fo)list=list.filter(b=>b.order===fo);
  if(fmd)list=list.filter(b=>(b.myDeck||'').toLowerCase().includes(fmd));
  if(fod)list=list.filter(b=>(b.oppDeck||'').toLowerCase().includes(fod));

  const sumEl=document.getElementById('history-summary');
  if(list.length){
    const w=list.filter(b=>b.result==='win').length;
    const wr=Math.round(w/list.length*100);
    sumEl.innerHTML=`<strong style="color:var(--text)">${list.length}戦</strong> <span style="color:var(--green)">${w}勝</span> <span style="color:var(--red)">${list.length-w}敗</span> &nbsp;勝率 <strong style="color:var(--text)">${wr}%</strong>`;
  } else { sumEl.innerHTML=''; }

  const el=document.getElementById('battles-list');
  if(!list.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">⚔️</div>該当する記録がありません</div>';return;}
  el.innerHTML=list.map(b=>{
    const d=new Date(b.time);
    const ts=d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    const badge=b.result==='win'?'<div class="result-badge badge-win">勝</div>':'<div class="result-badge badge-lose">敗</div>';
    const deckTxt=b.myDeck?` <span style="color:var(--text2);font-weight:400;font-size:12px">(${b.myDeck})</span>`:'';
    const orderPill=b.order==='first'?'<span class="pill pill-first">先攻</span>':'<span class="pill pill-second">後攻</span>';
    const fmtPill=`<span class="pill pill-fmt">${b.format}</span>`;
    const oppDeckTxt=b.oppDeck?`<div class="battle-opp-deck">🃏 相手: ${b.oppDeck}</div>`:'';
    const memoTxt=b.memo?`<div class="battle-memo">"${b.memo}"</div>`:'';
    return `<div class="battle-item">${badge}<div class="battle-info"><div class="battle-main">${b.myClass}${deckTxt} vs ${b.oppClass}${orderPill}${fmtPill}</div><div class="battle-sub">${b.mode||'ランクマッチ'}</div>${oppDeckTxt}${memoTxt}</div><div class="battle-meta"><span class="battle-time">${ts}</span><button class="delete-btn" onclick="deleteBattle(${b.id})" title="削除">🗑</button></div></div>`;
  }).join('');
}

function renderStats(){
  updateSummary();
  function buildStats(keyFn){
    return CLASSES.map(c=>{
      const s=battles.filter(b=>keyFn(b)===c);
      if(!s.length)return null;
      const w=s.filter(b=>b.result==='win').length;
      return{c,w,total:s.length,rate:Math.round(w/s.length*100)};
    }).filter(Boolean).sort((a,b)=>b.rate-a.rate);
  }
  function renderBar(data,cls){
    if(!data.length)return'<div class="empty-state" style="padding:.5rem;font-size:12px">データなし</div>';
    return data.map(d=>`<div class="class-row"><span class="class-name">${d.c}</span><div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${d.rate}%"></div></div><span class="rate-lbl">${d.rate}% <span style="color:var(--text3);font-size:10px">${d.total}戦</span></span></div>`).join('');
  }
  document.getElementById('my-class-stats').innerHTML=renderBar(buildStats(b=>b.myClass),'');
  document.getElementById('opp-class-stats').innerHTML=renderBar(buildStats(b=>b.oppClass),'opp');
}

function showTab(name){
  ['record','history','stats'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'block':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active',['record','history','stats'][i]===name);
  });
  if(name==='history')renderHistory();
  if(name==='stats')renderStats();
}

loadData();
</script>
</body>
</html>
